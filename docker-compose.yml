services:
  backend:
    build: ./backend
    container_name: pixflow-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - DATA_ROOT=/data
      - MAX_UPLOAD_SIZE_BYTES=524288000
      - VIDEO_MAX_WIDTH=1920
      - VIDEO_MAX_FPS=30
      - HOTSPOT_HOST_API_URL=http://host.docker.internal:4876
    volumes:
      - pixflow_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [pixflow]

  frontend:
    build: ./frontend
    container_name: pixflow-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on: [backend]
    networks: [pixflow]

  player:
    build: ./player
    profiles: ["docker-player"]
    container_name: pixflow-player
    restart: unless-stopped
    depends_on: [backend]
    networks: [pixflow]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=:0

networks:
  pixflow:
    driver: bridge

volumes:
  pixflow_data:
