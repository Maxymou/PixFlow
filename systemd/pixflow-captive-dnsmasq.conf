# PixFlow captive portal DNS overrides for NetworkManager shared-mode dnsmasq.
# This file is installed to:
# /etc/NetworkManager/dnsmasq-shared.d/pixflow-captive.conf
#
# It forces common captive portal probe domains to resolve to the Raspberry Pi
# hotspot gateway, so iOS/Android/Windows can open the PixFlow captive portal.

address=/captive.apple.com/10.42.0.1
address=/www.apple.com/10.42.0.1
address=/connectivitycheck.gstatic.com/10.42.0.1
address=/clients3.google.com/10.42.0.1
address=/connecttest.txt/10.42.0.1
address=/www.msftconnecttest.com/10.42.0.1
address=/dns.msftncsi.com/10.42.0.1
